<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body class="bg-light">

<!-- ================= LOGIN SECTION ================= -->
<div id="loginSection" class="container py-5">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card p-4 shadow">

        <h4 class="text-center mb-3">Admin Login</h4>

        <input type="email" id="email"
          class="form-control mb-3"
          placeholder="Email">

        <input type="password" id="password"
          class="form-control mb-3"
          placeholder="Password">

        <button id="loginBtn"
          class="btn btn-danger w-100">
          Login
        </button>

      </div>

    </div>

  </div>

</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="container py-4 d-none">

  <div class="d-flex justify-content-between align-items-center mb-3">

    <h3>Course Admin Panel</h3>

    <button id="logoutBtn"
      class="btn btn-outline-danger btn-sm">
      Logout
    </button>

  </div>

  <!-- FORM -->
  <div class="card p-4 shadow mb-4">

    <h5 id="formTitle">Add Course</h5>

    <form id="courseForm">

      <input type="hidden" id="courseId">

      <input class="form-control mb-2" id="title" placeholder="Title" required>
      <input class="form-control mb-2" id="duration" placeholder="Duration" required>
      <input class="form-control mb-2" id="intake" placeholder="Intake" required>
      <input class="form-control mb-2" id="image" placeholder="Image URL" required>
      <textarea class="form-control mb-2" id="description" placeholder="Description"></textarea>
      <textarea class="form-control mb-2" id="modules" placeholder="Modules (comma separated)"></textarea>

      <button class="btn btn-danger w-100">
        Save
      </button>

    </form>

  </div>

  <!-- LIST -->
  <div class="card p-4 shadow">

    <h5>Courses</h5>
    <div id="courseList"></div>

  </div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
